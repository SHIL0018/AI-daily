server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: activity-daily-server
  datasource:
    url: ${APP_DATABASE_URL:jdbc:h2:file:./data/activity-daily;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${APP_DATABASE_USERNAME:sa}
    password: ${APP_DATABASE_PASSWORD:}
    driver-class-name: ${APP_DATABASE_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Shanghai

springdoc:
  swagger-ui:
    path: /swagger-ui.html

activity-daily:
  jwt-secret: ${APP_TOKEN_SECRET:change-this-token-secret-before-production}
  api-key-secret: ${APP_API_KEY_SECRET:${APP_TOKEN_SECRET:change-this-token-secret-before-production}}
  access-token-minutes: ${APP_ACCESS_TOKEN_MINUTES:120}
  refresh-token-days: ${APP_REFRESH_TOKEN_DAYS:30}
  deepseek-base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  deepseek-default-model: ${DEEPSEEK_DEFAULT_MODEL:deepseek-v4-flash}
  deepseek-deep-model: ${DEEPSEEK_DEEP_ANALYSIS_MODEL:deepseek-v4-pro}
  deepseek-timeout-seconds: ${DEEPSEEK_TIMEOUT_SECONDS:120}
  deepseek-max-retries: ${DEEPSEEK_MAX_RETRIES:2}
  allowed-origins: ${APP_ALLOWED_ORIGINS:*}